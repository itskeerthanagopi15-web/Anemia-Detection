name: anemia_detection_project
description: AI Based Anemia Detection

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  cupertino_icons: ^1.0.6

  camera: ^0.10.5
  

  tflite_flutter: ^0.10.4
  image_picker: ^1.0.7
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  image: ^4.0.17
  google_mlkit_face_detection: ^0.9.0
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

 
  assets:
  - assets/models/eye_model.tflite
  - assets/models/palm_model.tflite
  - assets/models/nail_model.tflite
  